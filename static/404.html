<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Stranica nije pronađena | Skynex Global</title>
  
  <link rel="icon" href="/img/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/img/fav.png" type="image/png" sizes="64x64" />
  
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/clone.css" />
  <link rel="stylesheet" href="/css/custom-index.css" />
  <link rel="stylesheet" href="/css/redesign.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  
  <style>
    * {
      font-family: "Roboto", sans-serif !important;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
      text-align: center;
      position: relative;
    }
    
    .error-content {
      position: relative;
      max-width: 700px;
      width: 100%;
    }
    
    .error-logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 60px;
      height: auto;
      opacity: 0.9;
      border-radius: 50%;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    
    .error-logo:hover {
      opacity: 1;
    }
    
    .error-logo-link {
      text-decoration: none;
      display: inline-block;
    }
    
    .error-code {
      font-size: 120px;
      font-weight: 700;
      color: #FDB913;
      margin: 0;
      line-height: 1;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    
    .error-title {
      font-size: 36px;
      font-weight: 600;
      color: #ffffff;
      margin: 30px 0 20px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }
    
    .error-message {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }
    
    .error-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }
    
    .btn-home,
    .btn-back {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }
    
    .btn-home {
      background-color: #FDB913;
      color: #000000;
      border: 2px solid #FDB913;
    }
    
    .btn-home:hover {
      background-color: #ffd600;
      border-color: #ffd600;
      transform: translateY(-2px);
      color: #000000;
    }
    
    .btn-back {
      background-color: transparent;
      color: #FDB913;
      border: 2px solid #FDB913;
    }
    
    .btn-back:hover {
      background-color: rgba(253, 185, 19, 0.1);
      border-color: #ffd600;
      color: #ffd600;
      transform: translateY(-2px);
    }
    
    .error-divider {
      height: 2px;
      width: 100px;
      background: linear-gradient(90deg, transparent, #FDB913, transparent);
      margin: 40px auto;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 768px) {
      .error-container {
        padding: 80px 20px 40px;
      }
      
      .error-logo {
        width: 50px;
        top: 15px;
        left: 15px;
      }
      
      .error-code {
        font-size: 80px;
      }
      
      .error-title {
        font-size: 28px;
      }
      
      .error-message {
        font-size: 16px;
      }
      
      .error-actions {
        flex-direction: column;
        align-items: center;
      }
      
      .btn-home,
      .btn-back {
        width: 100%;
        max-width: 280px;
      }
    }
    
    /* Language toggle styles */
    .lang-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    
    .lang-toggle select {
      background-color: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      border: 1px solid rgba(253, 185, 19, 0.3);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .lang-toggle select:hover {
      border-color: #FDB913;
      background-color: rgba(0, 0, 0, 0.9);
    }
    
    .lang-toggle select:focus {
      outline: none;
      border-color: #FDB913;
    }
  </style>
</head>
<body>
  <div class="lang-toggle">
    <select id="languageSelect" onchange="switchLanguage(this.value)">
      <option value="sr">SR</option>
      <option value="en">EN</option>
    </select>
  </div>
  
  <a href="/" class="error-logo-link">
    <img src="/img/logo-beli-edited.png" alt="Skynex Global" class="error-logo" />
  </a>
  
  <div class="error-container">
    <div class="error-content">
      <h1 class="error-code" id="errorCode">404</h1>
      
      <h2 class="error-title" id="errorTitle">Stranica nije pronađena</h2>
      
      <div class="error-divider"></div>
      
      <p class="error-message" id="errorMessage">
        Stranica koju tražite ne postoji ili je premestena. 
        Možete se vratiti na početnu stranicu ili koristiti navigaciju za pronalaženje onoga što tražite.
      </p>
      
      <div class="error-actions">
        <a href="/" class="btn-home" id="btnHome">Početna stranica</a>
        <a href="javascript:history.back()" class="btn-back" id="btnBack">Nazad</a>
      </div>
    </div>
  </div>
  
  <script>
    // Language translations
    const translations = {
      sr: {
        title: "Stranica nije pronađena",
        message: "Stranica koju tražite ne postoji ili je premestena. Možete se vratiti na početnu stranicu ili koristiti navigaciju za pronalaženje onoga što tražite.",
        btnHome: "Početna stranica",
        btnBack: "Nazad"
      },
      en: {
        title: "Page Not Found",
        message: "The page you are looking for does not exist or has been moved. You can return to the home page or use the navigation to find what you're looking for.",
        btnHome: "Home Page",
        btnBack: "Go Back"
      }
    };
    
    // Get language from localStorage or default to Serbian
    let currentLang = localStorage.getItem('language') || 'sr';
    
    // Set initial language
    document.getElementById('languageSelect').value = currentLang;
    updateLanguage(currentLang);
    
    function switchLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('language', lang);
      updateLanguage(lang);
    }
    
    function updateLanguage(lang) {
      const t = translations[lang] || translations.sr;
      document.getElementById('errorTitle').textContent = t.title;
      document.getElementById('errorMessage').textContent = t.message;
      document.getElementById('btnHome').textContent = t.btnHome;
      document.getElementById('btnBack').textContent = t.btnBack;
    }
  </script>
</body>
</html>
